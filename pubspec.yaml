name: pedidosdp
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  firebase_core: ^4.11.0
  firebase_database: ^12.4.3
  shared_preferences: ^2.5.5
  firebase_auth: ^6.5.3
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.0
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


